<!DOCTYPE html>
<html>
<head>
    <title>Centered Box</title>
    <style>
        body {
            font-family: Arial;
        }

        /* Center the box horizontally */
        .box {
            width: 300px;
            height: 150px;
            background-color: lightblue;
            
            margin: 100px auto; /* horizontal centering */
            
            display: flex;
            justify-content: center;  /* horizontal text center */
            align-items: center;      /* vertical text center */

            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    Hello, I am centered!
</div>

</body>
</html>
