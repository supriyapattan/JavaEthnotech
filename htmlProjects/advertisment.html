<!DOCTYPE html>
<html>
<head>
    <title>Product Ad</title>
    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            margin: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product-img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        .product-name {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }
        .price {
            text-align: right;
            color: green;
            font-size: 20px;
            margin-top: 10px;
        }
        .description {
            text-align: justify;
            margin-top: 15px;
            line-height: 1.6;
        }
        .button {
            text-align: center;
            margin-top: 20px;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Product Image -->
    <img src="OIP.jpg"
         alt="Smart Watch"
         class="product-img">

    <div class="product-name">Smart Fitness Watch</div>
    <div class="price">₹2999</div>

    <p class="description">
        Track your health, monitor your heart rate, and stay connected with notifications.
        Stylish design with long battery life — perfect for everyday use.
    </p>

    <div class="button">
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
