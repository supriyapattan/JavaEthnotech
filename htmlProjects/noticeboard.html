<!DOCTYPE html>
<html>
<head>
    <title>School Notice</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f4f8;
            margin: 40px;
        }
        .board {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .school-name {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }
        .date {
            text-align: right;
            font-size: 14px;
            color: gray;
        }
        .content {
            text-align: justify;
            margin-top: 20px;
            line-height: 1.6;
        }
        .important {
            text-align: center;
            color: red;
            font-weight: bold;
            margin: 20px 0;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 5px;
        }
        .footer {
            text-align: left;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="board">

    <div class="school-name">ABC High School</div>
    <p class="date">Date: 31 March 2026</p>

    <p class="content">
        This is to inform all students that the annual examinations will commence next week.
        Students are advised to complete their syllabus and prepare well.
    </p>

    <div class="important">
        ⚠ Important: Carry your ID card during exams!
    </div>

    <div class="footer">
        Principal, ABC High School
    </div>

</div>

</body>
</html>
