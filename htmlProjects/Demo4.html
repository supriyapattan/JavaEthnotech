<!DOCTYPE html>
<html>
<head>
    <title>Perfect Center</title>
    <style>
        body {
            margin: 0;
        }

        /* Full-height container */
        .container {
            height: 100vh;  /* full screen height */
            display: flex;

            justify-content: center; /* horizontal center */
            align-items: center;     /* vertical center */

            background-color: #f0f4f8;
        }

        /* Box */
        .box {
            width: 300px;
            height: 150px;
            background-color: #4CAF50;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        Perfectly Centered Box
    </div>
</div>

</body>
</html>
